services:
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: mucaro-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MucaroScoutAdmin123!
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: mucaro-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

  api:
    build: ./app
    container_name: mucaro-scout-api
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=admin
      - OPENSEARCH_INDEX=logs-normalized
      - SQLITE_PATH=/data/mucaro-scout.db
      - CORS_ORIGINS=*
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-admin1234}
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - scout-data:/data
    depends_on:
      - opensearch

  frontend:
    build: ./frontend
    container_name: mucaro-scout-ui
    environment:
      # Default frontend calls /api, proxied by Vite to the API container.
      - VITE_API_URL=
    ports:
      - "5173:5173"
    depends_on:
      - api

  splunk:
    image: splunk/splunk:9.4
    container_name: mucaro-splunk
    profiles:
      - splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-admin1234}
    ports:
      - "8001:8000"
      - "8088:8088"
      - "9997:9997"
    volumes:
      - splunk-data:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc

volumes:
  opensearch-data:
  scout-data:
  splunk-data:
  splunk-etc:
